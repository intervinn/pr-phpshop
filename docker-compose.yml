services:
  php:
    build:
      context: .
      network: host
    container_name: shop-php
    environment:
      - "PHP_VALUE=auto_prepend_file=/var/www/html/vendor/autoload.php"
    volumes:
      - .:/var/www/html:delegated 
      - /var/www/html/vendor      
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: shop-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: shop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: app_db
      MYSQL_USER: username
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

volumes:
  db_data: